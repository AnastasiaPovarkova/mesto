name: UI Automation Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-state: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Chrome Browser (for Selenium)
      run: |
        sudo apt-get update
        sudo apt-get install -x11-apps -y google-chrome-stable

    - name: Run PyTest with Allure
      # Запускаем тесты в Headless режиме (в conftest.py надо будет включить options.add_argument("--headless"))
      run: |
        pytest --alluredir=allure-results
      continue-on-error: true # Позволит продолжить сборку для генерации отчета, даже если тесты упали

    - name: Get Allure history
      uses: actions/checkout@v4
      if: always()
      with:
        ref: gh-pages
        path: gh-pages

    - name: Allure Report Action
      uses: simple-elf/allure-report-action@master
      if: always()
      with:
        allure_results: allure-results
        allure_history: allure-history
        keep_reports: 20

    - name: Deploy Allure Report to GitHub Pages
      uses: peaceiris/actions-gh-deploy@v3
      if: always()
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        PUBLISH_BRANCH: gh-pages
        PUBLISH_DIR: allure-history